name: 3D contribution graph

on:
  schedule:
    - cron: "23 4 * * *"   # daily, ~11:23 UTC+7
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          # Uses the default token (public data). Add a personal access token as the
          # secret GH_TOKEN (read:user) to include PRIVATE contributions in the graph.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        with:
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh 3D contribution graph"
            git push
          fi
